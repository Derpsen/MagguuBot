services:
  magguu-bot:
    build: .
    image: magguu-bot:latest
    container_name: magguu-bot
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - /mnt/user/appdata/magguu-bot/data:/app/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: magguu-bot
